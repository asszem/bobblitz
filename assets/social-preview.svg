<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#17172b"/>
      <stop offset="55%" stop-color="#10101d"/>
      <stop offset="100%" stop-color="#090913"/>
    </linearGradient>
    <radialGradient id="glowA" cx="14%" cy="18%" r="52%">
      <stop offset="0%" stop-color="#4d96ff" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#4d96ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="82%" cy="76%" r="54%">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="board" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22223f"/>
      <stop offset="100%" stop-color="#17172c"/>
    </linearGradient>
    <linearGradient id="tile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a4c"/>
      <stop offset="100%" stop-color="#1d1d37"/>
    </linearGradient>
    <linearGradient id="selected" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ec0ff"/>
      <stop offset="100%" stop-color="#2f63f0"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="35%" stop-color="#ffd93d"/>
      <stop offset="68%" stop-color="#6bcb77"/>
      <stop offset="100%" stop-color="#4d96ff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="pathGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <g transform="translate(74 82)">
    <text x="0" y="72" fill="url(#title)" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="900" letter-spacing="6">BÖBBLITZ</text>
    <text x="0" y="136" fill="#f4f5ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Egyéni szóvadászat megosztható táblákkal</text>
    <text x="0" y="190" fill="#b8bfdc" font-family="Segoe UI, Arial, sans-serif" font-size="24">
      <tspan x="0" dy="0">Húzz végig a szomszédos betűkön, találd meg az összes szót,</tspan>
      <tspan x="0" dy="34">és küldj saját rejtvényeket barátoknak magyarul vagy angolul.</tspan>
    </text>

    <g transform="translate(0 308)" fill="#eef2ff" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">
      <text x="0" y="0">MEGOSZTHATÓ JÁTÉK</text>
      <text x="0" y="42">OFFLINE MÓD</text>
    </g>

    <g transform="translate(0 430)" fill="#9ea7cf" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
      <text x="0" y="0">Játékmódok: Sima, Szórejtés, Betűk megadása</text>
    </g>
  </g>

  <g transform="translate(760 48)" filter="url(#softShadow)">
    <rect x="12" y="12" width="342" height="342" rx="36" fill="url(#board)" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>

    <g stroke="rgba(255,255,255,0.08)" stroke-width="3">
      <rect x="24" y="24" width="72" height="72" rx="16" fill="url(#tile)"/>
      <rect x="106" y="24" width="72" height="72" rx="16" fill="url(#tile)"/>
      <rect x="188" y="24" width="72" height="72" rx="16" fill="url(#tile)"/>
      <rect x="270" y="24" width="72" height="72" rx="16" fill="url(#tile)"/>

      <rect x="24" y="106" width="72" height="72" rx="16" fill="url(#selected)"/>
      <rect x="106" y="106" width="72" height="72" rx="16" fill="url(#tile)"/>
      <rect x="188" y="106" width="72" height="72" rx="16" fill="url(#tile)"/>
      <rect x="270" y="106" width="72" height="72" rx="16" fill="url(#tile)"/>

      <rect x="24" y="188" width="72" height="72" rx="16" fill="url(#selected)"/>
      <rect x="106" y="188" width="72" height="72" rx="16" fill="url(#selected)"/>
      <rect x="188" y="188" width="72" height="72" rx="16" fill="url(#tile)"/>
      <rect x="270" y="188" width="72" height="72" rx="16" fill="url(#tile)"/>

      <rect x="24" y="270" width="72" height="72" rx="16" fill="url(#tile)"/>
      <rect x="106" y="270" width="72" height="72" rx="16" fill="url(#selected)"/>
      <rect x="188" y="270" width="72" height="72" rx="16" fill="url(#tile)"/>
      <rect x="270" y="270" width="72" height="72" rx="16" fill="url(#tile)"/>
    </g>

    <g fill="#d9ddf7" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" text-anchor="middle">
      <text x="60" y="72">K</text>
      <text x="142" y="72">E</text>
      <text x="224" y="72">Ü</text>
      <text x="306" y="72">Y</text>

      <text x="60" y="154" fill="#ffffff">K</text>
      <text x="142" y="154">O</text>
      <text x="224" y="154">Í</text>
      <text x="306" y="154">U</text>

      <text x="60" y="236" fill="#ffffff">E</text>
      <text x="142" y="236" fill="#ffffff">Z</text>
      <text x="224" y="236">É</text>
      <text x="306" y="236">O</text>

      <text x="60" y="318">Z</text>
      <text x="142" y="318" fill="#ffffff">I</text>
      <text x="224" y="318">A</text>
      <text x="306" y="318">S</text>
    </g>
  </g>
</svg>
