<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18182b"/>
      <stop offset="100%" stop-color="#0d0d18"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#21213b"/>
      <stop offset="100%" stop-color="#17172d"/>
    </linearGradient>
    <linearGradient id="tile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#272748"/>
      <stop offset="100%" stop-color="#1d1d36"/>
    </linearGradient>
    <linearGradient id="selected" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ec0ff"/>
      <stop offset="100%" stop-color="#275be8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect x="62" y="62" width="388" height="388" rx="40" fill="url(#panel)" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>

  <g stroke="rgba(255,255,255,0.08)" stroke-width="3">
    <rect x="91" y="91" width="92" height="92" rx="18" fill="url(#tile)"/>
    <rect x="210" y="91" width="92" height="92" rx="18" fill="url(#tile)"/>
    <rect x="329" y="91" width="92" height="92" rx="18" fill="url(#tile)"/>

    <rect x="91" y="210" width="92" height="92" rx="18" fill="url(#selected)"/>
    <rect x="210" y="210" width="92" height="92" rx="18" fill="url(#tile)"/>
    <rect x="329" y="210" width="92" height="92" rx="18" fill="url(#tile)"/>

    <rect x="91" y="329" width="92" height="92" rx="18" fill="url(#selected)"/>
    <rect x="210" y="329" width="92" height="92" rx="18" fill="url(#selected)"/>
    <rect x="329" y="329" width="92" height="92" rx="18" fill="url(#tile)"/>
  </g>

  <g fill="#d9ddf7" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="800" text-anchor="middle">
    <text x="137" y="150">K</text>
    <text x="256" y="150">E</text>
    <text x="375" y="150">Ü</text>

    <text x="137" y="269" fill="#ffffff">K</text>
    <text x="256" y="269">O</text>
    <text x="375" y="269">Í</text>

    <text x="137" y="388" fill="#ffffff">E</text>
    <text x="256" y="388" fill="#ffffff">Z</text>
    <text x="375" y="388">É</text>
  </g>
</svg>
