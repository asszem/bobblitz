<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BöbBlitz</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      background: #0e0e1a;
      color: white;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 24px 16px 40px;
    }

    header {
      text-align: center;
      margin-bottom: 18px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .lang-btn {
      padding: 8px 18px;
      border: 1.5px solid #2a2a44;
      border-radius: 50px;
      background: transparent;
      color: #666688;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.4px;
      transition: color 0.15s, border-color 0.15s, transform 0.1s;
      outline: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .lang-btn:hover  { color: #9999bb; border-color: #3a3a5a; }
    .lang-btn:active { transform: scale(0.94); }

    h1 {
      font-size: clamp(2rem, 7vw, 2.8rem);
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 40%, #6bcb77 70%, #4d96ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 0.75rem;
      color: #44445a;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    #score-row {
      display: flex;
      gap: 28px;
      align-items: center;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: #55556a;
    }

    #score-row .stat strong {
      display: block;
      font-size: 1.4rem;
      font-weight: 800;
      color: #e0e0f0;
      line-height: 1.1;
    }

    /* â”€â”€ Grid â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */

    #grid-wrap {
      position: relative;
      width: min(340px, 96vw);
      padding: 12px;
      background: linear-gradient(145deg, #1a1a30, #141428);
      border-radius: 24px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 24px 64px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.07);
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    #canvas-overlay {
      position: absolute;
      pointer-events: none;
      z-index: 2;
    }

    .cell {
      aspect-ratio: 1;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.35rem, 4.8vw, 1.7rem);
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(160deg, #22223e, #191930);
      border: 1.5px solid rgba(255,255,255,0.07);
      color: #b0b0d0;
      position: relative;
      z-index: 1;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
      will-change: transform;
      animation: cellAppear 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .cell.selected {
      background: linear-gradient(145deg, #e94560, #b5302a);
      border-color: rgba(255,150,150,0.3);
      color: #fff;
      transform: scale(1.1);
      box-shadow: 0 6px 22px rgba(233,69,96,0.55);
      z-index: 3;
    }

    .cell.first-selected {
      background: linear-gradient(145deg, #ff7b7b, #e94560);
      box-shadow: 0 6px 28px rgba(255,107,107,0.75);
    }

    .cell.flash-good {
      animation: flashGood 0.52s ease-out forwards;
      transition: none;
      color: white;
      z-index: 3;
    }

    /* â”€â”€ Word display â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */

    #word-area {
      margin-top: 10px;
      width: min(340px, 96vw);
      min-height: 82px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(34, 34, 58, 0.35);
      border: 1px solid rgba(255,255,255,0.06);
    }

    #word-display {
      font-size: clamp(1.7rem, 6.5vw, 2.4rem);
      font-weight: 900;
      letter-spacing: 7px;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-shadow: 0 0 28px rgba(233,69,96,0.5);
      transition: color 0.15s, text-shadow 0.15s;
    }

    .letter-span {
      display: inline-block;
      animation: letterPop 0.18s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    #word-meta {
      font-size: 0.74rem;
      color: #444460;
      letter-spacing: 1px;
      height: 16px;
      transition: color 0.15s;
    }

    /* â”€â”€ Controls â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */

    #controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    #action-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 11px 26px;
      border: none;
      border-radius: 50px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.1s, box-shadow 0.15s, opacity 0.15s;
      outline: none;
    }

    .btn:active  { transform: scale(0.94); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: transparent;
      color: #55557a;
      border: 1.5px solid #2a2a44;
    }

    .btn-ghost:hover { color: #8888aa; border-color: #3a3a5a; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(7,8,18,0.72);
      backdrop-filter: blur(4px);
      z-index: 25;
    }

    .modal-backdrop[hidden] {
      display: none;
    }

    .modal-card {
      width: min(420px, 96vw);
      background: linear-gradient(165deg, #1a1a30, #131325);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      box-shadow: 0 26px 60px rgba(0,0,0,0.6);
      padding: 18px 18px 16px;
      color: #e6e6f5;
    }

    .modal-image {
      display: block;
      width: min(180px, 55vw);
      max-height: 180px;
      object-fit: contain;
      margin: 0 auto 12px;
      border-radius: 10px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.35);
    }

    .modal-image-rounded {
      border-radius: 10px;
      clip-path: inset(0 round 10px);
    }

    .modal-title {
      margin: 0 0 8px;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    .modal-text {
      margin: 0;
      color: #b8b8d8;
      line-height: 1.45;
      font-size: 0.9rem;
    }

    .mode-option {
      width: 100%;
      justify-content: flex-start;
      text-align: left;
      margin-top: 12px;
      color: #cfd6ff;
      border-color: #3a4068;
      background: rgba(30, 34, 60, 0.55);
    }

    .mode-option:hover {
      color: #eef2ff;
      border-color: #4e5793;
      background: rgba(38, 44, 78, 0.72);
    }

    .game-mode-label {
      font-size: 0.68rem;
      color: #44445a;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 6px;
    }

    .modal-input {
      width: 100%;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(17, 19, 34, 0.8);
      color: #eef2ff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      outline: none;
    }

    .modal-input:focus {
      border-color: rgba(96, 165, 250, 0.8);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
    }

    .modal-error {
      min-height: 18px;
      margin-top: 8px;
      color: #fda4af;
      font-size: 0.8rem;
      line-height: 1.3;
    }

    .modal-rules {
      white-space: pre-line;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .btn-danger {
      background: linear-gradient(145deg, #ef4444, #b91c1c);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 10px 24px rgba(185,28,28,0.35);
    }

    .btn-danger:hover {
      filter: brightness(1.05);
    }

    /* â”€â”€ Found words â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */

    #found-section {
      margin-top: 24px;
      width: min(340px, 96vw);
    }

    #found-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    #found-header h3 {
      font-size: 0.7rem;
      color: #33334a;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    #word-tally {
      font-size: 0.75rem;
      color: #33334a;
    }

    #words-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      max-height: 160px;
      overflow-y: auto;
    }

    .chip {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 50px;
      padding: 5px 13px;
      font-size: 0.82rem;
      color: #c0c0e0;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: default;
      animation: chipIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      transition: border-color 0.15s, color 0.15s;
    }

    .chip:hover, .chip.chip-active {
      border-color: rgba(245,158,11,0.5);
      color: #fff;
    }

    .chip .pts { color: #e94560; font-size: 0.72rem; font-weight: 700; }

    .chip-revealed {
      opacity: 0.45;
      font-style: italic;
    }
    .chip-revealed:hover, .chip-revealed.chip-active { opacity: 0.8; }

    .cell.highlight-found {
      border-color: rgba(255,255,255,0.35);
      color: white;
      transform: scale(1.08);
      z-index: 3;
      transition: none;
    }

    .cell.first-highlight {
      z-index: 3;
    }

    /* â”€â”€ Animations â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */

    @keyframes cellAppear {
      0%   { opacity: 0; transform: scale(0.6) translateY(8px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes letterPop {
      0%   { transform: scale(0.4) translateY(6px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    @keyframes chipIn {
      from { transform: scale(0.75) translateY(6px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }

    @keyframes flashGood {
      0%   { background: linear-gradient(145deg, #22c55e, #16a34a);
             box-shadow: 0 6px 28px rgba(34,197,94,0.85);
             transform: scale(1.1);
             border-color: rgba(100,255,150,0.5); }
      55%  { background: linear-gradient(145deg, #4ade80, #22c55e);
             transform: scale(1.13);
             box-shadow: 0 8px 32px rgba(34,197,94,0.95); }
      100% { background: linear-gradient(160deg, #22223e, #191930);
             box-shadow: none;
             transform: scale(1);
             border-color: rgba(255,255,255,0.07); }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>BöbBlitz</h1>
    <button id="lang-btn" class="lang-btn">🇭🇺 Magyar</button>
  </div>
  <p class="tagline" id="tagline">EgyĂ©ni szĂłvadĂˇsz</p>
</header>

<p id="game-mode-label" class="game-mode-label"></p>

<div id="score-row">
  <div class="stat"><span id="lbl-score">Pont</span><strong id="score">0</strong></div>
  <div class="stat"><span id="lbl-words">Szavak</span><strong id="word-count">0 / ?</strong></div>
  <div class="stat"><span id="lbl-best">Legjobb</span><strong id="best">0</strong></div>
</div>

<div id="grid-wrap">
  <canvas id="canvas-overlay"></canvas>
  <div id="grid"></div>
</div>

<div id="word-area">
  <div id="word-display"></div>
  <div id="word-meta"></div>
</div>

<div id="controls">
  <div id="action-buttons">
    <button class="btn btn-ghost" id="reveal-btn">Szabad a gazda!</button>
    <button class="btn btn-ghost" id="new-btn">Új játék</button>
  </div>
</div>

<div id="found-section">
  <div id="found-header">
    <h3 id="found-words-lbl">TalĂˇlt szavak</h3>
    <span id="word-tally">0</span>
  </div>
  <div id="words-list"></div>
</div>

<div id="confirm-modal" class="modal-backdrop" hidden aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-text">
    <img class="modal-image modal-image-rounded" src="./assets/lexi.png" alt="Lexi" />
    <h3 id="confirm-title" class="modal-title">Warning</h3>
    <p id="confirm-text" class="modal-text"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="confirm-cancel-btn">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok-btn">New Game</button>
    </div>
  </div>
</div>

<div id="win-modal" class="modal-backdrop" hidden aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="win-title" aria-describedby="win-text">
    <img class="modal-image modal-image-rounded" src="./assets/kavics.JPG" alt="Kavics" />
    <h3 id="win-title" class="modal-title">Congratulations!</h3>
    <p id="win-text" class="modal-text">You found all words on this board.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="win-close-btn">Close</button>
    </div>
  </div>
</div>



<div id="modes-modal" class="modal-backdrop" hidden aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modes-title" aria-describedby="modes-text">
    <h3 id="modes-title" class="modal-title">Game modes</h3>
    <p id="modes-text" class="modal-text"></p>
    <button class="btn btn-ghost mode-option" id="mode-standard-btn">Standard</button>
    <button class="btn btn-ghost mode-option" id="mode-hide-word-btn">Hide a word</button>
  </div>
</div>


<div id="hide-word-modal" class="modal-backdrop" hidden aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="hide-word-title" aria-describedby="hide-word-text">
    <h3 id="hide-word-title" class="modal-title">Hide a word</h3>
    <p id="hide-word-text" class="modal-text">Enter one word with 4 to 10 letters.</p>
    <input id="hide-word-input" class="modal-input" type="text" maxlength="10" spellcheck="false" autocomplete="off" />
    <p id="hide-word-error" class="modal-error"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="hide-word-cancel-btn">Close</button>
      <button class="btn btn-danger" id="hide-word-start-btn">Start</button>
    </div>
  </div>
</div>
<script>
  const LANG_FILES = {
  hu: './lang/hu.json',
  en: './lang/en.json',
};

let lang = 'hu';
let langData = null;
const langCache = new Map();

function formatTemplate(template, values) {
  return template.replace(/\{(\w+)\}/g, (_, key) => `${values[key] ?? ''}`);
}

function createTrieNode() {
  return { end: false, next: Object.create(null) };
}

function buildTrie(words) {
  const root = createTrieNode();
  for (const word of words) {
    let node = root;
    for (const ch of word) {
      if (!node.next[ch]) node.next[ch] = createTrieNode();
      node = node.next[ch];
    }
    node.end = true;
  }
  return root;
}

function trieStep(root, text) {
  let node = root;
  for (const ch of text) {
    node = node.next[ch];
    if (!node) return null;
  }
  return node;
}

function parseWords(raw, minWordLength, maxWordLength) {
  return [...new Set(
    raw
      .trim()
      .split(/\s+/)
      .map(w => w.toUpperCase())
      .filter(w => w.length >= minWordLength && w.length <= maxWordLength)
  )];
}

async function loadLanguageData(code) {
  if (langCache.has(code)) return langCache.get(code);
  const file = LANG_FILES[code];
  if (!file) throw new Error(`Unknown language: ${code}`);
  const res = await fetch(file, { cache: 'no-cache' });
  if (!res.ok) throw new Error(`Failed to load ${file}: ${res.status}`);
  const data = await res.json();
  const minWordLength = Number(data.minWordLength || 2);
  const maxWordLength = Number(data.maxWordLength || 8);
  let dictRaw = '';
  if (data.dictionaryFile) {
    const dictRes = await fetch(data.dictionaryFile, { cache: 'no-cache' });
    if (!dictRes.ok) throw new Error(`Failed to load ${data.dictionaryFile}: ${dictRes.status}`);
    dictRaw = await dictRes.text();
  } else if (data.dictionaryRaw) {
    // Backward compatibility: older JSONs may still inline dictionary text.
    dictRaw = data.dictionaryRaw;
  } else {
    throw new Error(`No dictionary source for language: ${code}`);
  }
  const words = parseWords(dictRaw, minWordLength, maxWordLength);
  const normalized = {
    ...data,
    minWordLength,
    maxWordLength,
    pool: data.pool || '',
    labels: data.labels || {},
    trie: buildTrie(words),
    wordCount: words.length,
  };
  langCache.set(code, normalized);
  return normalized;
}

async function switchLanguage(code) {
  lang = code;
  langData = await loadLanguageData(code);
}

function getTallyText(n) {
  const s = t();
  const unit = n === 1 ? s.tallyOne : s.tallyMany;
  return `${n} ${unit}`;
}

const t           = () => langData.labels;
const getPool     = () => langData.pool;
const MODE_CLASSIC = 'classic';
const MODE_HIDE_WORD = 'hide-word';
let currentMode = MODE_CLASSIC;
let hideWordTarget = '';

const dictionaryHasWord = word => {
  const node = trieStep(langData.trie, word);
  return !!(node && node.end);
};
const dictionaryHasPrefix = prefix => !!trieStep(langData.trie, prefix);
const hasWord = word => {
  if (currentMode === MODE_HIDE_WORD) return !!hideWordTarget && word === hideWordTarget;
  return dictionaryHasWord(word);
};
const hasPrefix = prefix => {
  if (currentMode === MODE_HIDE_WORD) return !!hideWordTarget && hideWordTarget.startsWith(prefix);
  return dictionaryHasPrefix(prefix);
};
const getActiveMinWordLength = () => (
  currentMode === MODE_HIDE_WORD
    ? Math.max(Number(langData.minWordLength || 3), 4)
    : Number(langData.minWordLength || 3)
);
const getActiveMaxWordLength = () => (
  currentMode === MODE_HIDE_WORD
    ? Math.max(Number(langData.maxWordLength || 8), hideWordTarget.length || 0)
    : Number(langData.maxWordLength || 8)
);
const GAME_GENERATION_RULES = Object.freeze({
  minFindableWords: 5,
  requiredByLength: Object.freeze({ 4: 3, 5: 2 }),
  maxAttempts: 5000,
});
const SAVE_KEY = 'bobblitz-save-v1';
// â”€â”€ State â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  let grid       = [];
  let sel        = [];
  let drag       = false;
  let score      = 0;
  let bestWord   = '';
  let found      = new Set();
  let revealedWords = new Set();
  let gameWords  = [];
  let totalWords = -1;   // -1 = not yet computed
  let revealed   = false;
  let winModalShown = false;
  let hoveredChip = null;
  const wordPathCache = new Map();
  let pendingConfirmAction = null;

  // â”€â”€ DOM refs â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  const gridEl   = document.getElementById('grid');
  const wordDisp = document.getElementById('word-display');
  const wordMeta = document.getElementById('word-meta');
  const scoreEl  = document.getElementById('score');
  const countEl  = document.getElementById('word-count');
  const bestEl   = document.getElementById('best');
  const tallyEl  = document.getElementById('word-tally');
  const canvas   = document.getElementById('canvas-overlay');
  const ctx      = canvas.getContext('2d');
  const wordsList = document.getElementById('words-list');
  const confirmModal = document.getElementById('confirm-modal');
  const confirmTitleEl = document.getElementById('confirm-title');
  const confirmTextEl = document.getElementById('confirm-text');
  const confirmCancelBtn = document.getElementById('confirm-cancel-btn');
  const confirmOkBtn = document.getElementById('confirm-ok-btn');
  const winModal = document.getElementById('win-modal');
  const winTitleEl = document.getElementById('win-title');
  const winTextEl = document.getElementById('win-text');
  const winCloseBtn = document.getElementById('win-close-btn');
  const modesModal = document.getElementById('modes-modal');
  const modesTitleEl = document.getElementById('modes-title');
  const modesTextEl = document.getElementById('modes-text');
  const standardModeBtn = document.getElementById('mode-standard-btn');
  const hideWordModeBtn = document.getElementById('mode-hide-word-btn');
const hideWordModal = document.getElementById('hide-word-modal');
  const hideWordTitleEl = document.getElementById('hide-word-title');
  const hideWordTextEl = document.getElementById('hide-word-text');
  const hideWordInputEl = document.getElementById('hide-word-input');
  const hideWordErrorEl = document.getElementById('hide-word-error');
  const hideWordCancelBtn = document.getElementById('hide-word-cancel-btn');
  const hideWordStartBtn = document.getElementById('hide-word-start-btn');

  function clearSavedGame() {
    try {
      localStorage.removeItem(SAVE_KEY);
    } catch (_) {}
  }

  function normalizeInputWord(raw) {
    return String(raw || '').trim().toLocaleUpperCase(lang === 'hu' ? 'hu-HU' : 'en-US');
  }

  function getPoolCharset() {
    return new Set([...getPool()]);
  }

  function validateHideWordInput(rawWord) {
    const word = normalizeInputWord(rawWord);
    if (word.length < 4 || word.length > 10) {
      return { ok: false, word: '', errorKey: 'hideWordErrorLength' };
    }
    const charset = getPoolCharset();
    if (![...word].every(ch => charset.has(ch))) {
      return { ok: false, word: '', errorKey: 'hideWordErrorChars' };
    }
    return { ok: true, word, errorKey: '' };
  }

  function setHideWordError(message) {
    hideWordErrorEl.textContent = message || '';
  }


  function persistGameState() {
    if (!Array.isArray(grid) || grid.length !== 16) return;
    if (!Array.isArray(gameWords) || gameWords.length < 1) return;
    const words = [...gameWords]
      .sort((a, b) => a.localeCompare(b, lang === 'hu' ? 'hu-HU' : 'en-US'))
      .map(w => ({
        w,
        s: revealedWords.has(w) ? 'revealed' : (found.has(w) ? 'found' : 'none'),
      }));
    const payload = {
      v: 1,
      lang,
      mode: currentMode,
      targetWord: currentMode === MODE_HIDE_WORD ? hideWordTarget : '',
      grid: [...grid],
      score,
      words,
      savedAt: Date.now(),
    };
    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
    } catch (_) {}
  }

  function invalidSavedGame() {
    clearSavedGame();
    return false;
  }

  async function tryLoadSavedGame() {
    let raw = '';
    try {
      raw = localStorage.getItem(SAVE_KEY) || '';
    } catch (_) {
      return false;
    }
    if (!raw) return false;

    let payload = null;
    try {
      payload = JSON.parse(raw);
    } catch (_) {
      return invalidSavedGame();
    }

    if (!payload || payload.v !== 1) return invalidSavedGame();
    if (typeof payload.lang !== 'string' || !LANG_FILES[payload.lang]) return invalidSavedGame();
    if (!Array.isArray(payload.grid) || payload.grid.length !== 16) return invalidSavedGame();
    if (!Array.isArray(payload.words) || payload.words.length < 1) return invalidSavedGame();
    if (!Number.isFinite(payload.score) || payload.score < 0) return invalidSavedGame();

    await switchLanguage(payload.lang);

    const mode = payload.mode === MODE_HIDE_WORD ? MODE_HIDE_WORD : MODE_CLASSIC;
    let restoredTargetWord = '';
    if (mode === MODE_HIDE_WORD) {
      const validTarget = validateHideWordInput(payload.targetWord || '');
      if (!validTarget.ok) return invalidSavedGame();
      restoredTargetWord = validTarget.word;
    }
    currentMode = mode;
    hideWordTarget = restoredTargetWord;

    const normalizedGrid = payload.grid.map(ch => String(ch || '').trim().toUpperCase());
    if (normalizedGrid.some(ch => ch.length < 1)) return invalidSavedGame();
    grid = normalizedGrid;
    hoveredChip = null;
    clearHighlight();
    wordPathCache.clear();

    const analysis = analyzeGridWords(false);
    gameWords = [...analysis.allWords];
    totalWords = analysis.totalWords;
    const validWords = new Set(gameWords);

    if (payload.words.length !== validWords.size) return invalidSavedGame();

    const restoredFound = new Set();
    const restoredRevealed = new Set();
    const savedStatuses = [];
    const seen = new Set();
    for (const item of payload.words) {
      if (!item || typeof item.w !== 'string') {
        return invalidSavedGame();
      }
      let status = 'none';
      if (typeof item.s === 'string') {
        if (item.s !== 'none' && item.s !== 'found' && item.s !== 'revealed') {
          return invalidSavedGame();
        }
        status = item.s;
      } else if (typeof item.found === 'boolean') {
        // Backward compatibility for older save format.
        status = item.found ? 'found' : 'none';
      } else {
        return invalidSavedGame();
      }
      const w = item.w.trim().toUpperCase();
      if (!w || seen.has(w) || !validWords.has(w)) return invalidSavedGame();
      seen.add(w);
      if (status === 'found' || status === 'revealed') restoredFound.add(w);
      if (status === 'revealed') restoredRevealed.add(w);
      savedStatuses.push({ w, status });
    }
    if (seen.size !== validWords.size) return invalidSavedGame();

    found = restoredFound;
    revealedWords = restoredRevealed;
    score = Number(payload.score) || 0;
    bestWord = '';
    for (const w of found) {
      if (w.length > bestWord.length) bestWord = w;
    }
    revealed = revealedWords.size > 0;
    winModalShown = totalWords > 0 && found.size >= totalWords;

    applyLang();
    renderGrid();
    resetSel();
    scoreEl.textContent = `${score}`;
    bestEl.textContent = bestWord || '0';
    tallyEl.textContent = found.size > 0 ? getTallyText(found.size) : '0';
    updateCountEl();
    wordsList.innerHTML = '';
    for (const item of savedStatuses) {
      if (item.status === 'found') addChip(item.w, calcScore(item.w));
      else if (item.status === 'revealed') addRevealedChip(item.w);
    }
    document.getElementById('reveal-btn').disabled = revealed;
    return true;
  }

  // â”€â”€ Init â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function randomGridFromPool(pool) {
    return Array.from({ length: 16 }, () => pool[Math.floor(Math.random() * pool.length)]);
  }

  function shuffleInPlace(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = arr[i];
      arr[i] = arr[j];
      arr[j] = tmp;
    }
  }

  function findRandomPath(length) {
    if (length < 1 || length > 16) return null;
    const maxStartAttempts = 350;

    function growPath(path, used, targetLength) {
      if (path.length === targetLength) return true;
      const last = path[path.length - 1];
      const options = [];
      for (let i = 0; i < 16; i++) {
        if (!used.has(i) && isAdj(last, i)) options.push(i);
      }
      shuffleInPlace(options);
      for (const next of options) {
        used.add(next);
        path.push(next);
        if (growPath(path, used, targetLength)) return true;
        path.pop();
        used.delete(next);
      }
      return false;
    }

    for (let attempt = 0; attempt < maxStartAttempts; attempt++) {
      const start = Math.floor(Math.random() * 16);
      const used = new Set([start]);
      const path = [start];
      if (growPath(path, used, length)) return path;
    }
    return null;
  }

  function generateHideWordGrid(word) {
    const pool = getPool();
    if (!pool || pool.length < 1) throw new Error('Language pool is empty.');
    const path = findRandomPath(word.length);
    if (!path) throw new Error('Unable to generate path for hidden word.');
    const nextGrid = randomGridFromPool(pool);
    for (let i = 0; i < word.length; i++) {
      nextGrid[path[i]] = word[i];
    }
    return nextGrid;
  }

  function meetsGameGenerationRules(stats) {
    if (!stats) return false;
    if (stats.totalWords < GAME_GENERATION_RULES.minFindableWords) return false;
    const lengths = GAME_GENERATION_RULES.requiredByLength;
    return Object.keys(lengths).every(len => (stats.lengthCounts[len] || 0) >= lengths[len]);
  }

  function initGame() {
    totalWords = -1;
    revealed   = false;
    winModalShown = false;
    hoveredChip = null;
    clearHighlight();
    wordPathCache.clear();
    revealedWords.clear();
    closeWinModal();
    document.getElementById('reveal-btn').disabled = false;

    if (currentMode === MODE_HIDE_WORD) {
      if (!hideWordTarget) {
        throw new Error('Hide-word mode requires a target word.');
      }
      grid = generateHideWordGrid(hideWordTarget);
      const analysis = analyzeGridWords(false);
      gameWords = [...analysis.allWords];
      totalWords = analysis.totalWords;
      if (!gameWords.includes(hideWordTarget)) {
        throw new Error('Hidden word not found on generated board.');
      }
      renderGrid();
      resetSel();
      updateCountEl();
      return;
    }

    const pool = getPool();
    let chosenGrid = null;

    for (let attempt = 0; attempt < GAME_GENERATION_RULES.maxAttempts; attempt++) {
      grid = randomGridFromPool(pool);
      const quickStats = analyzeGridWords(true);
      if (meetsGameGenerationRules(quickStats)) {
        chosenGrid = [...grid];
        break;
      }
    }

    if (!chosenGrid) {
      throw new Error('Unable to generate a board that meets game rules.');
    }

    grid = chosenGrid;
    const analysis = analyzeGridWords(false);
    gameWords = [...analysis.allWords];
    totalWords = analysis.totalWords;
    renderGrid();
    resetSel();
    updateCountEl();
  }

  function renderGrid() {
    gridEl.innerHTML = '';
    grid.forEach((letter, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = letter;
      cell.dataset.i = i;
      cell.style.animationDelay = `${i * 0.03}s`;
      gridEl.appendChild(cell);
    });
    requestAnimationFrame(fitCanvas);
  }

  // â”€â”€ Canvas â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function fitCanvas() {
    const gr = gridEl.getBoundingClientRect();
    const wr = document.getElementById('grid-wrap').getBoundingClientRect();
    canvas.width  = gr.width;
    canvas.height = gr.height;
    canvas.style.left = (gr.left - wr.left) + 'px';
    canvas.style.top  = (gr.top  - wr.top)  + 'px';
    redrawPath();
  }

  function cellCenter(idx) {
    const cr = gridEl.children[idx].getBoundingClientRect();
    const gr = gridEl.getBoundingClientRect();
    return { x: cr.left - gr.left + cr.width / 2,
             y: cr.top  - gr.top  + cr.height / 2 };
  }

  function drawStrokePath(pts, glowColor, lineColor) {
    const OFFSET = 21; // keep line outside letter centers
    ctx.lineCap  = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = glowColor;
    ctx.lineWidth   = 22;
    traceOffsetPath(pts, OFFSET);
    ctx.strokeStyle = lineColor;
    ctx.lineWidth   = 7;
    traceOffsetPath(pts, OFFSET);
  }

  function tracePath(pts) {
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
  }

  function traceOffsetPath(pts, offset) {
    for (let i = 0; i < pts.length - 1; i++) {
      const A = pts[i], B = pts[i + 1];
      const dx = B.x - A.x, dy = B.y - A.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (!dist) continue;
      const ux = dx / dist, uy = dy / dist;
      const sx = A.x + ux * offset, sy = A.y + uy * offset;
      const ex = B.x - ux * offset, ey = B.y - uy * offset;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(ex, ey);
      ctx.stroke();
    }
  }

  function redrawPath() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (sel.length < 2) return;
    drawStrokePath(sel.map(cellCenter), 'rgba(233,69,96,0.22)', 'rgba(233,69,96,0.85)');
  }

  // â”€â”€ Arrow path (for found-word highlight) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function drawArrowPath(pts, glowColor, lineColor) {
    const OFFSET      = 23;        // px gap from tile center so arrow never covers the letter
    const HEAD_LEN    = 12;        // arrowhead arm length
    const HEAD_SPREAD = Math.PI / 5.5;  // arrowhead half-angle (~33Â°)

    for (let i = 0; i < pts.length - 1; i++) {
      const A = pts[i], B = pts[i + 1];
      const dx = B.x - A.x, dy = B.y - A.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const ux = dx / dist, uy = dy / dist;

      // Shaft: start slightly outside source, end slightly outside dest
      const sx = A.x + ux * OFFSET, sy = A.y + uy * OFFSET;
      const ex = B.x - ux * OFFSET, ey = B.y - uy * OFFSET;
      const angle = Math.atan2(dy, dx);

      // Arrowhead arms
      const ax1 = ex - HEAD_LEN * Math.cos(angle - HEAD_SPREAD);
      const ay1 = ey - HEAD_LEN * Math.sin(angle - HEAD_SPREAD);
      const ax2 = ex - HEAD_LEN * Math.cos(angle + HEAD_SPREAD);
      const ay2 = ey - HEAD_LEN * Math.sin(angle + HEAD_SPREAD);

      // â€” Glow pass â€”
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';
      ctx.strokeStyle = glowColor;
      ctx.lineWidth   = 20;
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
      ctx.lineWidth   = 14;
      ctx.beginPath(); ctx.moveTo(ax1, ay1); ctx.lineTo(ex, ey); ctx.lineTo(ax2, ay2); ctx.stroke();

      // â€” Line pass â€”
      ctx.strokeStyle = lineColor;
      ctx.lineWidth   = 4;
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
      ctx.lineWidth   = 3;
      ctx.beginPath(); ctx.moveTo(ax1, ay1); ctx.lineTo(ex, ey); ctx.lineTo(ax2, ay2); ctx.stroke();
    }
  }

  // â”€â”€ Word path highlight â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function findWordPath(word) {
    const letters = word.split('');
    const len     = letters.length;
    const visited = new Array(16).fill(false);
    const path    = [];

    function dfs() {
      const idx  = path.length;
      if (idx === len) return true;
      const last = idx > 0 ? path[idx - 1] : -1;
      for (let c = 0; c < 16; c++) {
        if (!visited[c] && grid[c] === letters[idx] && (last === -1 || isAdj(last, c))) {
          visited[c] = true;
          path.push(c);
          if (dfs()) return true;
          path.pop();
          visited[c] = false;
        }
      }
      return false;
    }

    dfs();
    return path.length === len ? [...path] : null;
  }

  function getCachedWordPath(word) {
    if (!word) return null;
    if (wordPathCache.has(word)) return wordPathCache.get(word);
    const path = findWordPath(word);
    wordPathCache.set(word, path || null);
    return path;
  }

  function highlightCurrentHoveredChip() {
    const chip = hoveredChip;
    if (!chip || !chip.isConnected) return;
    const word = (chip.dataset.word || '').trim().toUpperCase();
    if (!word) return;
    const source = chip.dataset.source === 'reveal' ? 'reveal' : 'user';
    const path = getCachedWordPath(word);
    if (hoveredChip !== chip) return;
    showHighlight(chip, path, source);
  }

  function showHighlight(chipEl, path, source = 'user') {
    clearHighlight();
    if (!path) return;
    chipEl.classList.add('chip-active');
    const cells = gridEl.children;
    const last  = path.length - 1;
    const palette = source === 'reveal'
      ? {
          first: ['#93c5fd', '#3b82f6'],
          mid:   ['#3b82f6', '#1d4ed8'],
          last:  ['#60a5fa', '#1e40af'],
          border: 'rgba(147,197,253,0.48)',
          shadow: 'rgba(59,130,246,0.48)',
          arrowGlow: 'rgba(30,64,175,0.46)',
          arrowLine: 'rgba(239,246,255,0.98)'
        }
      : {
          first: ['#86efac', '#22c55e'],
          mid:   ['#22c55e', '#15803d'],
          last:  ['#4ade80', '#166534'],
          border: 'rgba(134,239,172,0.48)',
          shadow: 'rgba(34,197,94,0.46)',
          arrowGlow: 'rgba(22,101,52,0.45)',
          arrowLine: 'rgba(240,253,244,0.98)'
        };

    path.forEach((cellIdx, pos) => {
      const cell = cells[cellIdx];
      cell.classList.add('highlight-found');
      if (pos === 0) cell.classList.add('first-highlight');

      // Compute travel direction through this tile (prev â†’ next, or edge tiles)
      const prevIdx = pos > 0    ? path[pos - 1] : null;
      const nextIdx = pos < last ? path[pos + 1] : null;
      const refFrom = prevIdx !== null ? prevIdx : cellIdx;
      const refTo   = nextIdx !== null ? nextIdx : cellIdx;
      const dc = (refTo % 4)           - (refFrom % 4);
      const dr = Math.floor(refTo / 4) - Math.floor(refFrom / 4);
      // CSS gradient angle: 0deg = top, clockwise â†’ atan2(dc, -dr)
      const deg = Math.round(Math.atan2(dc, -dr) * 180 / Math.PI);

      // Directional gradient colours per position
      if (pos === 0) {
        cell.style.background = `linear-gradient(${deg}deg, ${palette.first[0]}, ${palette.first[1]})`;
      } else if (pos === last) {
        cell.style.background = `linear-gradient(${deg}deg, ${palette.last[0]}, ${palette.last[1]})`;
      } else {
        cell.style.background = `linear-gradient(${deg}deg, ${palette.mid[0]}, ${palette.mid[1]})`;
      }
      cell.style.borderColor = palette.border;
      cell.style.boxShadow = `0 6px 22px ${palette.shadow}`;
    });

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (path.length >= 2) {
      drawArrowPath(path.map(cellCenter), palette.arrowGlow, palette.arrowLine);
    }
  }

  function clearHighlight() {
    document.querySelectorAll('.chip-active').forEach(el => el.classList.remove('chip-active'));
    const cells = gridEl.children;
    for (let i = 0; i < cells.length; i++) {
      // Force transition:none so the clear is instant — matching the canvas which clears instantly.
      // Without this, .cell's transition:0.12s kicks in the moment highlight-found is removed,
      // causing cells to visually linger (animate back) while the canvas arrow is already gone.
      cells[i].style.transition = 'none';
      cells[i].classList.remove('highlight-found', 'first-highlight');
      cells[i].style.background = '';
      cells[i].style.borderColor = '';
      cells[i].style.boxShadow = '';
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (sel.length >= 2) redrawPath();
    // Restore transitions next frame so selection/hover animations still work.
    requestAnimationFrame(() => {
      for (let i = 0; i < cells.length; i++) cells[i].style.transition = '';
    });
  }

  // â”€â”€ Selection â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function isAdj(a, b) {
    const ra = Math.floor(a / 4), ca = a % 4;
    const rb = Math.floor(b / 4), cb = b % 4;
    return Math.abs(ra - rb) <= 1 && Math.abs(ca - cb) <= 1 && a !== b;
  }

  function trySelect(idx) {
    if (idx < 0 || idx >= 16) return;
    const existAt = sel.indexOf(idx);
    if (existAt >= 0) {
      // Ignore jitter on the same current tile: no redraw, no word refresh.
      if (existAt === sel.length - 1) return;
      sel = sel.slice(0, existAt + 1);
      applyVisuals();
      return;
    }
    if (sel.length === 0 || isAdj(sel[sel.length - 1], idx)) {
      sel.push(idx);
      applyVisuals();
    }
  }

  function applyVisuals() {
    const cells = gridEl.children;
    for (let i = 0; i < cells.length; i++) {
      const pos = sel.indexOf(i);
      cells[i].classList.toggle('selected',       pos >= 0);
      cells[i].classList.toggle('first-selected', pos === 0);
    }
    redrawPath();
    refreshWordDisplay();
  }

  function refreshWordDisplay() {
    const word = sel.map(i => grid[i]).join('');
    if (!word) {
      wordDisp.innerHTML = '';
      wordDisp.style.color = '';
      wordDisp.style.textShadow = '';
      wordMeta.textContent = '';
      wordMeta.style.color = '';
      return;
    }
    wordDisp.innerHTML = word.split('')
      .map((l, i) => `<span class="letter-span" style="animation-delay:${i * 0.04}s">${l}</span>`)
      .join('');
    const len = word.length;
    const minLen = getActiveMinWordLength();
    const s = t();
    wordMeta.textContent = len >= minLen
      ? formatTemplate(s.wordMetaTemplate, { len, pts: calcScore(word) })
      : formatTemplate(len === 1 ? s.wordShortOne : s.wordShortMany, { len });
  }

  function resetSel() {
    sel  = [];
    drag = false;
    applyVisuals();
  }

  // â”€â”€ Auto-submit on release â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function trySubmit() {
    drag = false;
    const word = sel.map(i => grid[i]).join('');

    // Invalid (too short, unknown, already found): silent reset
    if (word.length < getActiveMinWordLength() || !hasWord(word) || found.has(word)) {
      resetSel();
      return;
    }

    // Valid new word â€” flash green
    const flashIdxs = [...sel];
    const cells = gridEl.children;

    sel = [];
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (const i of flashIdxs) {
      cells[i].classList.remove('selected', 'first-selected');
      cells[i].classList.add('flash-good');
    }

    // Turn word display green
    wordDisp.style.color      = '#4ade80';
    wordDisp.style.textShadow = '0 0 28px rgba(74,222,128,0.7)';
    wordMeta.style.color      = '#4ade80';

    setTimeout(() => {
      found.add(word);
      revealedWords.delete(word);
      const pts = calcScore(word);
      score += pts;
      scoreEl.textContent = score;
      updateCountEl();
      tallyEl.textContent = getTallyText(found.size);

      if (word.length > bestWord.length) {
        bestWord = word;
        bestEl.textContent = word;
      }

      addChip(word, pts);

      for (const i of flashIdxs) cells[i].classList.remove('flash-good');

      wordDisp.innerHTML        = '';
      wordDisp.style.color      = '';
      wordDisp.style.textShadow = '';
      wordMeta.textContent      = '';
      wordMeta.style.color      = '';
      persistGameState();
      if (!winModalShown && totalWords > 0 && found.size >= totalWords) {
        winModalShown = true;
        openWinModal();
      }
    }, 520);
  }

  // â”€â”€ Mouse events â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function cellFromEl(el) {
    const c = el && el.closest ? el.closest('.cell') : null;
    return c ? parseInt(c.dataset.i) : -1;
  }

  function cellFromPoint(x, y) {
    const el = document.elementFromPoint(x, y);
    if (!el) return -1;
    if (el.classList.contains('cell')) return parseInt(el.dataset.i);
    const c = el.closest && el.closest('.cell');
    return c ? parseInt(c.dataset.i) : -1;
  }

  gridEl.addEventListener('mousedown', e => {
    const idx = cellFromEl(e.target);
    if (idx < 0) return;
    e.preventDefault();
    drag = true;
    sel  = [];
    trySelect(idx);
  });

  document.addEventListener('mousemove', e => {
    if (!drag) return;
    trySelect(cellFromPoint(e.clientX, e.clientY));
  });

  document.addEventListener('mouseup', () => {
    if (drag) trySubmit();
    else drag = false;
  });

  // â”€â”€ Touch events â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  gridEl.addEventListener('touchstart', e => {
    e.preventDefault();
    drag = true;
    sel  = [];
    const t = e.touches[0];
    trySelect(cellFromPoint(t.clientX, t.clientY));
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (!drag) return;
    e.preventDefault();
    const t = e.touches[0];
    trySelect(cellFromPoint(t.clientX, t.clientY));
  }, { passive: false });

  document.addEventListener('touchend', () => {
    if (drag) trySubmit();
    else drag = false;
  });

  // â”€â”€ Buttons â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function hasGameProgress() {
    return score > 0 || bestWord.length > 0;
  }

  function revealAllWords() {
    if (revealed) return;
    revealed = true;
    document.getElementById('reveal-btn').disabled = true;
    const all = getAllWords();
    const sorted = [...all].sort();
    for (const word of sorted) {
      if (!found.has(word)) {
        found.add(word);
        revealedWords.add(word);
        addRevealedChip(word);
      }
    }
    updateCountEl();
    tallyEl.textContent = getTallyText(found.size);
    persistGameState();
  }

  document.getElementById('reveal-btn').addEventListener('click', () => {
    if (revealed) return;
    if (hasGameProgress()) {
      openWarningConfirm(() => revealAllWords());
      return;
    }
    revealAllWords();
  });

  async function switchLanguageAndReset() {
    await switchLanguage(lang === 'hu' ? 'en' : 'hu');
    currentMode = MODE_CLASSIC;
    hideWordTarget = '';
    score = 0; bestWord = '';
    scoreEl.textContent = '0';
    bestEl.textContent  = '0';
    tallyEl.textContent = '0';
    found.clear();
    revealedWords.clear();
    wordsList.innerHTML = '';
    applyLang();
    initGame();
    persistGameState();
  }

  document.getElementById('lang-btn').addEventListener('click', async () => {
    if (hasGameProgress()) {
      openWarningConfirm(() => switchLanguageAndReset());
      return;
    }
    await switchLanguageAndReset();
  });

  function applyLang() {
    const s = t();
    document.documentElement.lang                          = lang;
    document.getElementById('tagline').textContent         = s.tagline;
    document.getElementById('lbl-score').textContent       = s.score;
    document.getElementById('lbl-words').textContent       = s.words;
    document.getElementById('lbl-best').textContent        = s.best;
    document.getElementById('reveal-btn').textContent      = s.revealAll;
    document.getElementById('new-btn').textContent         = s.newGame;
    document.getElementById('found-words-lbl').textContent = s.foundWords;
    document.getElementById('lang-btn').textContent        = s.langLabel;
    confirmTitleEl.textContent = s.confirmTitle;
    confirmTextEl.textContent = s.confirm;
    confirmCancelBtn.textContent = s.confirmCancel;
    confirmOkBtn.textContent = s.confirmOk;
    winTitleEl.textContent = s.winTitle || 'Congratulations!';
    winTextEl.textContent = s.winText || 'You found all words on this board.';
    winCloseBtn.textContent = s.winClose || s.confirmCancel || 'Close';
    modesTitleEl.textContent = s.gameModesTitle || s.gameModes;
    modesTextEl.textContent = s.gameModesHint || '';
    standardModeBtn.textContent = s.standardMode || 'Standard';
    hideWordModeBtn.textContent = s.hideWordMode || 'Hide a word';
    hideWordTitleEl.textContent = s.hideWordTitle || s.hideWordMode || 'Hide a word';
    hideWordTextEl.textContent = s.hideWordHint || '';
    hideWordInputEl.placeholder = s.hideWordPlaceholder || '';
    hideWordCancelBtn.textContent = s.hideWordClose || s.confirmCancel || 'Close';
    hideWordStartBtn.textContent = s.hideWordStart || s.confirmOk || 'Start';
    setHideWordError('');
    if (!bestWord) bestEl.textContent = '0';
    if (found.size > 0) tallyEl.textContent = getTallyText(found.size);
    else tallyEl.textContent = '0';
    refreshWordDisplay();
    updateGameModeLabel();
  }

  function updateGameModeLabel() {
    const s = t();
    const el = document.getElementById('game-mode-label');
    if (!el) return;
    if (currentMode === MODE_HIDE_WORD) {
      el.textContent = `${s.hideWordMode || 'Hide a word'}${hideWordTarget ? ': ' + hideWordTarget : ''}`;
    } else {
      el.textContent = s.standardMode || 'Standard';
    }
  }

  function startNewGame() {
    currentMode = MODE_CLASSIC;
    hideWordTarget = '';
    score = 0; bestWord = '';
    scoreEl.textContent = '0';
    bestEl.textContent  = '0';
    tallyEl.textContent = '0';
    found.clear();
    revealedWords.clear();
    wordsList.innerHTML = '';
    initGame();
    updateGameModeLabel();
    persistGameState();
  }

  function openWarningConfirm(onConfirm) {
    const s = t();
    confirmTitleEl.textContent = s.confirmTitle;
    confirmTextEl.textContent = s.confirm;
    confirmCancelBtn.textContent = s.confirmCancel;
    confirmOkBtn.textContent = s.confirmOk;
    pendingConfirmAction = onConfirm;
    confirmModal.hidden = false;
    confirmModal.setAttribute('aria-hidden', 'false');
    confirmCancelBtn.focus();
  }

  function closeNewGameConfirm() {
    pendingConfirmAction = null;
    confirmModal.hidden = true;
    confirmModal.setAttribute('aria-hidden', 'true');
  }

  function openWinModal() {
    const s = t();
    winTitleEl.textContent = s.winTitle || 'Congratulations!';
    winTextEl.textContent = s.winText || 'You found all words on this board.';
    winCloseBtn.textContent = s.winClose || s.confirmCancel || 'Close';
    winModal.hidden = false;
    winModal.setAttribute('aria-hidden', 'false');
    winCloseBtn.focus();
  }

  function closeWinModal() {
    winModal.hidden = true;
    winModal.setAttribute('aria-hidden', 'true');
  }

  function openGameModesModal() {
    const s = t();
    modesTitleEl.textContent = s.gameModesTitle || s.gameModes;
    modesTextEl.textContent = s.gameModesHint || '';
    standardModeBtn.textContent = s.standardMode || 'Standard';
    hideWordModeBtn.textContent = s.hideWordMode || 'Hide a word';
    modesModal.hidden = false;
    modesModal.setAttribute('aria-hidden', 'false');
    standardModeBtn.focus();
  }

  function closeGameModesModal() {
    modesModal.hidden = true;
    modesModal.setAttribute('aria-hidden', 'true');
  }

function openHideWordModal() {
    const s = t();
    hideWordTitleEl.textContent = s.hideWordTitle || s.hideWordMode || 'Hide a word';
    hideWordTextEl.textContent = s.hideWordHint || '';
    hideWordInputEl.placeholder = s.hideWordPlaceholder || '';
    hideWordCancelBtn.textContent = s.hideWordClose || s.confirmCancel || 'Close';
    hideWordStartBtn.textContent = s.hideWordStart || s.confirmOk || 'Start';
    hideWordInputEl.value = '';
    setHideWordError('');
    hideWordModal.hidden = false;
    hideWordModal.setAttribute('aria-hidden', 'false');
    hideWordInputEl.focus();
  }

  function closeHideWordModal() {
    hideWordModal.hidden = true;
    hideWordModal.setAttribute('aria-hidden', 'true');
    hideWordInputEl.value = '';
    setHideWordError('');
  }

  function startHideWordGame(word) {
    currentMode = MODE_HIDE_WORD;
    hideWordTarget = word;
    score = 0; bestWord = '';
    scoreEl.textContent = '0';
    bestEl.textContent  = '0';
    tallyEl.textContent = '0';
    found.clear();
    revealedWords.clear();
    wordsList.innerHTML = '';
    initGame();
    updateGameModeLabel();
    persistGameState();
  }

  function submitHideWordMode() {
    const s = t();
    const validation = validateHideWordInput(hideWordInputEl.value);
    if (!validation.ok) {
      setHideWordError(s[validation.errorKey] || s.hideWordErrorLength || '');
      return;
    }
    closeHideWordModal();
    startHideWordGame(validation.word);
  }

  document.getElementById('new-btn').addEventListener('click', () => {
    if (hasGameProgress()) {
      openWarningConfirm(openGameModesModal);
      return;
    }
    openGameModesModal();
  });
  standardModeBtn.addEventListener('click', () => {
    closeGameModesModal();
    startNewGame();
  });
  hideWordModeBtn.addEventListener('click', () => {
    closeGameModesModal();
    openHideWordModal();
  });
  hideWordCancelBtn.addEventListener('click', closeHideWordModal);
  hideWordStartBtn.addEventListener('click', submitHideWordMode);
  hideWordInputEl.addEventListener('input', () => setHideWordError(''));
  hideWordInputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      submitHideWordMode();
    }
  });

  confirmCancelBtn.addEventListener('click', closeNewGameConfirm);
  confirmOkBtn.addEventListener('click', async () => {
    const action = pendingConfirmAction;
    closeNewGameConfirm();
    if (action) await action();
  });
  winCloseBtn.addEventListener('click', () => { closeWinModal(); openGameModesModal(); });
  confirmModal.addEventListener('click', e => {
    if (e.target === confirmModal) closeNewGameConfirm();
  });
  winModal.addEventListener('click', e => {
    if (e.target === winModal) { closeWinModal(); openGameModesModal(); }
  });
hideWordModal.addEventListener('click', e => {
    if (e.target === hideWordModal) closeHideWordModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    if (!confirmModal.hidden) closeNewGameConfirm();
    if (!winModal.hidden) { closeWinModal(); openGameModesModal(); }
    if (!hideWordModal.hidden) closeHideWordModal();
  });
  modesModal.addEventListener('keydown', e => {
    const modeBtns = [standardModeBtn, hideWordModeBtn];
    const idx = modeBtns.indexOf(document.activeElement);
    if (idx < 0) return;
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
      e.preventDefault();
      modeBtns[(idx + 1) % modeBtns.length].focus();
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      e.preventDefault();
      modeBtns[(idx + modeBtns.length - 1) % modeBtns.length].focus();
    }
  });
  wordsList.addEventListener('mouseleave', () => {
    hoveredChip = null;
    clearHighlight();
  });
  window.addEventListener('blur', () => { hoveredChip = null; clearHighlight(); });

  // â”€â”€ Helpers â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function updateCountEl() {
    countEl.textContent = totalWords >= 0
      ? `${found.size} / ${totalWords}`
      : `${found.size} / ?`;
    const allFound = totalWords > 0 && found.size >= totalWords;
    document.getElementById('reveal-btn').disabled = revealed || allFound;
  }

  function calcScore(word) {
    const n = word.length;
    if (n < 3)   return 0;
    if (n === 3) return 1;
    if (n === 4) return 2;
    if (n === 5) return 4;
    if (n === 6) return 7;
    if (n === 7) return 11;
    return 15 + (n - 8) * 5;
  }

  function addChip(word, pts) {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.dataset.word = word;
    chip.dataset.source = 'user';
    chip.innerHTML = `${word}<span class="pts">+${pts}</span>`;
    chip.addEventListener('mouseenter', () => {
      hoveredChip = chip;
      clearHighlight();
      highlightCurrentHoveredChip();
    });
    chip.addEventListener('mouseleave', () => {
      if (hoveredChip === chip) hoveredChip = null;
      clearHighlight();
    });
    chip.addEventListener('touchstart', e => {
      e.preventDefault();
      hoveredChip = chip;
      clearHighlight();
      highlightCurrentHoveredChip();
    }, { passive: false });
    chip.addEventListener('touchend', () => {
      hoveredChip = null;
      clearHighlight();
    });
    chip.addEventListener('touchcancel', () => {
      hoveredChip = null;
      clearHighlight();
    });

    wordsList.prepend(chip);
  }

  function addRevealedChip(word) {
    const chip = document.createElement('div');
    chip.className = 'chip chip-revealed';
    chip.dataset.word = word;
    chip.dataset.source = 'reveal';
    chip.textContent = word;
    chip.addEventListener('mouseenter', () => {
      hoveredChip = chip;
      clearHighlight();
      highlightCurrentHoveredChip();
    });
    chip.addEventListener('mouseleave', () => {
      if (hoveredChip === chip) hoveredChip = null;
      clearHighlight();
    });
    chip.addEventListener('touchstart', e => {
      e.preventDefault();
      hoveredChip = chip;
      clearHighlight();
      highlightCurrentHoveredChip();
    }, { passive: false });
    chip.addEventListener('touchend', () => {
      hoveredChip = null;
      clearHighlight();
    });
    chip.addEventListener('touchcancel', () => {
      hoveredChip = null;
      clearHighlight();
    });
    wordsList.append(chip);
  }

  // â”€â”€ Total words (DFS + prefix pruning) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function analyzeGridWords(earlyStopOnGameRules = false) {
    const all = new Set();
    const vis = new Array(16).fill(false);
    const lengthCounts = Object.create(null);
    const maxLen = getActiveMaxWordLength();
    let stop = false;

    function registerWord(word) {
      if (all.has(word)) return;
      all.add(word);
      const len = word.length;
      lengthCounts[len] = (lengthCounts[len] || 0) + 1;
      if (earlyStopOnGameRules && meetsGameGenerationRules({ totalWords: all.size, lengthCounts })) {
        stop = true;
      }
    }

    function dfs(last, word) {
      if (stop) return;
      if (!hasPrefix(word)) return;
      if (word.length >= langData.minWordLength && hasWord(word)) registerWord(word);
      if (stop || word.length >= maxLen) return;
      for (let n = 0; n < 16; n++) {
        if (!vis[n] && isAdj(last, n)) {
          vis[n] = true;
          dfs(n, word + grid[n]);
          vis[n] = false;
          if (stop) return;
        }
      }
    }

    for (let s = 0; s < 16; s++) {
      if (stop) break;
      vis[s] = true;
      dfs(s, grid[s]);
      vis[s] = false;
    }

    return {
      allWords: all,
      totalWords: all.size,
      lengthCounts,
    };
  }

  function getAllWords() { return new Set(gameWords); }
  function countTotalWords() { return gameWords.length; }

  // â”€â”€ Resize â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  window.addEventListener('resize', () => requestAnimationFrame(fitCanvas));

  // â”€â”€ Start â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  (async function boot() {
    const restored = await tryLoadSavedGame();
    if (restored) return;
    await switchLanguage(lang);
    applyLang();
    startNewGame();
  })();
</script>
