<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BöbBlitz</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      background: #0e0e1a;
      color: white;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 24px 16px 40px;
    }

    header {
      text-align: center;
      margin-bottom: 18px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .lang-btn {
      padding: 4px 12px;
      border: 1.5px solid #2a2a44;
      border-radius: 50px;
      background: transparent;
      color: #666688;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: color 0.15s, border-color 0.15s, transform 0.1s;
      outline: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .lang-btn:hover  { color: #9999bb; border-color: #3a3a5a; }
    .lang-btn:active { transform: scale(0.94); }

    h1 {
      font-size: clamp(2rem, 7vw, 2.8rem);
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 40%, #6bcb77 70%, #4d96ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 0.75rem;
      color: #44445a;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    #score-row {
      display: flex;
      gap: 28px;
      align-items: center;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: #55556a;
    }

    #score-row .stat strong {
      display: block;
      font-size: 1.4rem;
      font-weight: 800;
      color: #e0e0f0;
      line-height: 1.1;
    }

    /* ── Grid ─────────────────────────────────────────── */

    #grid-wrap {
      position: relative;
      width: min(340px, 96vw);
      padding: 12px;
      background: linear-gradient(145deg, #1a1a30, #141428);
      border-radius: 24px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 24px 64px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.07);
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    #canvas-overlay {
      position: absolute;
      pointer-events: none;
      z-index: 2;
    }

    .cell {
      aspect-ratio: 1;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.35rem, 4.8vw, 1.7rem);
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(160deg, #22223e, #191930);
      border: 1.5px solid rgba(255,255,255,0.07);
      color: #b0b0d0;
      position: relative;
      z-index: 1;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
      will-change: transform;
      animation: cellAppear 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .cell.selected {
      background: linear-gradient(145deg, #e94560, #b5302a);
      border-color: rgba(255,150,150,0.3);
      color: #fff;
      transform: scale(1.1);
      box-shadow: 0 6px 22px rgba(233,69,96,0.55);
      z-index: 3;
    }

    .cell.first-selected {
      background: linear-gradient(145deg, #ff7b7b, #e94560);
      box-shadow: 0 6px 28px rgba(255,107,107,0.75);
    }

    .cell.flash-good {
      animation: flashGood 0.52s ease-out forwards;
      transition: none;
      color: white;
      z-index: 3;
    }

    /* ── Word display ──────────────────────────────────── */

    #word-area {
      margin-top: 18px;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    #word-display {
      font-size: clamp(1.7rem, 6.5vw, 2.4rem);
      font-weight: 900;
      letter-spacing: 7px;
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-shadow: 0 0 28px rgba(233,69,96,0.5);
      transition: color 0.15s, text-shadow 0.15s;
    }

    .letter-span {
      display: inline-block;
      animation: letterPop 0.18s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    #word-meta {
      font-size: 0.78rem;
      color: #444460;
      letter-spacing: 1px;
      height: 16px;
      transition: color 0.15s;
    }

    /* ── Controls ──────────────────────────────────────── */

    #controls {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 11px 26px;
      border: none;
      border-radius: 50px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.1s, box-shadow 0.15s, opacity 0.15s;
      outline: none;
    }

    .btn:active  { transform: scale(0.94); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: transparent;
      color: #55557a;
      border: 1.5px solid #2a2a44;
    }

    .btn-ghost:hover { color: #8888aa; border-color: #3a3a5a; }

    /* ── Found words ───────────────────────────────────── */

    #found-section {
      margin-top: 24px;
      width: min(340px, 96vw);
    }

    #found-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    #found-header h3 {
      font-size: 0.7rem;
      color: #33334a;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    #word-tally {
      font-size: 0.75rem;
      color: #33334a;
    }

    #words-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      max-height: 160px;
      overflow-y: auto;
    }

    .chip {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 50px;
      padding: 5px 13px;
      font-size: 0.82rem;
      color: #c0c0e0;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: default;
      animation: chipIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      transition: border-color 0.15s, color 0.15s;
    }

    .chip:hover, .chip.chip-active {
      border-color: rgba(245,158,11,0.5);
      color: #fff;
    }

    .chip .pts { color: #e94560; font-size: 0.72rem; font-weight: 700; }

    .chip-revealed {
      opacity: 0.45;
      font-style: italic;
    }
    .chip-revealed:hover, .chip-revealed.chip-active { opacity: 0.8; }

    .cell.highlight-found {
      background: linear-gradient(145deg, #f59e0b, #d97706);
      border-color: rgba(255,220,100,0.4);
      color: white;
      transform: scale(1.08);
      box-shadow: 0 6px 22px rgba(245,158,11,0.6);
      z-index: 3;
      transition: none;
    }

    .cell.first-highlight {
      background: linear-gradient(145deg, #fbbf24, #f59e0b);
      box-shadow: 0 6px 28px rgba(251,191,36,0.8);
    }

    /* ── Animations ────────────────────────────────────── */

    @keyframes cellAppear {
      0%   { opacity: 0; transform: scale(0.6) translateY(8px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes letterPop {
      0%   { transform: scale(0.4) translateY(6px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    @keyframes chipIn {
      from { transform: scale(0.75) translateY(6px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }

    @keyframes flashGood {
      0%   { background: linear-gradient(145deg, #22c55e, #16a34a);
             box-shadow: 0 6px 28px rgba(34,197,94,0.85);
             transform: scale(1.1);
             border-color: rgba(100,255,150,0.5); }
      55%  { background: linear-gradient(145deg, #4ade80, #22c55e);
             transform: scale(1.13);
             box-shadow: 0 8px 32px rgba(34,197,94,0.95); }
      100% { background: linear-gradient(160deg, #22223e, #191930);
             box-shadow: none;
             transform: scale(1);
             border-color: rgba(255,255,255,0.07); }
    }
  </style>

<body>

  <div id="words-list"></div>
</div>

  const STRINGS = {

  // ── Init ────────────────────────────────────────────────────────────
  function initGame() {
    totalWords = -1;
    revealed   = false;
    document.getElementById('reveal-btn').disabled = false;
    const pool = getPool();
    grid = Array.from({ length: 16 }, () => pool[Math.floor(Math.random() * pool.length)]);
    renderGrid();
    resetSel();
    updateCountEl();
    // Compute total words after first paint
    setTimeout(() => {
      totalWords = countTotalWords();
      updateCountEl();
    }, 60);
  }

  function renderGrid() {
    gridEl.innerHTML = '';
    grid.forEach((letter, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = letter;
      cell.dataset.i = i;
      cell.style.animationDelay = `${i * 0.03}s`;
      gridEl.appendChild(cell);
    });
    requestAnimationFrame(fitCanvas);
  }

  // ── Canvas ──────────────────────────────────────────────────────────
  function fitCanvas() {
    const gr = gridEl.getBoundingClientRect();
    const wr = document.getElementById('grid-wrap').getBoundingClientRect();
    canvas.width  = gr.width;
    canvas.height = gr.height;
    canvas.style.left = (gr.left - wr.left) + 'px';
    canvas.style.top  = (gr.top  - wr.top)  + 'px';
    redrawPath();
  }

  function cellCenter(idx) {
    const cr = gridEl.children[idx].getBoundingClientRect();
    const gr = gridEl.getBoundingClientRect();
    return { x: cr.left - gr.left + cr.width / 2,
             y: cr.top  - gr.top  + cr.height / 2 };
  }

  function drawStrokePath(pts, glowColor, lineColor) {
    ctx.lineCap  = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = glowColor;
    ctx.lineWidth   = 22;
    tracePath(pts);
    ctx.strokeStyle = lineColor;
    ctx.lineWidth   = 7;
    tracePath(pts);
  }

  function tracePath(pts) {
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
  }

  function redrawPath() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (sel.length < 2) return;
    drawStrokePath(sel.map(cellCenter), 'rgba(233,69,96,0.22)', 'rgba(233,69,96,0.85)');
  }

  // ── Arrow path (for found-word highlight) ───────────────────────────
  function drawArrowPath(pts, glowColor, lineColor) {
    const OFFSET      = 23;        // px gap from tile center so arrow never covers the letter
    const HEAD_LEN    = 12;        // arrowhead arm length
    const HEAD_SPREAD = Math.PI / 5.5;  // arrowhead half-angle (~33°)

    for (let i = 0; i < pts.length - 1; i++) {
      const A = pts[i], B = pts[i + 1];
      const dx = B.x - A.x, dy = B.y - A.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const ux = dx / dist, uy = dy / dist;

      // Shaft: start slightly outside source, end slightly outside dest
      const sx = A.x + ux * OFFSET, sy = A.y + uy * OFFSET;
      const ex = B.x - ux * OFFSET, ey = B.y - uy * OFFSET;
      const angle = Math.atan2(dy, dx);

      // Arrowhead arms
      const ax1 = ex - HEAD_LEN * Math.cos(angle - HEAD_SPREAD);
      const ay1 = ey - HEAD_LEN * Math.sin(angle - HEAD_SPREAD);
      const ax2 = ex - HEAD_LEN * Math.cos(angle + HEAD_SPREAD);
      const ay2 = ey - HEAD_LEN * Math.sin(angle + HEAD_SPREAD);

      // — Glow pass —
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';
      ctx.strokeStyle = glowColor;
      ctx.lineWidth   = 20;
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
      ctx.lineWidth   = 14;
      ctx.beginPath(); ctx.moveTo(ax1, ay1); ctx.lineTo(ex, ey); ctx.lineTo(ax2, ay2); ctx.stroke();

      // — Line pass —
      ctx.strokeStyle = lineColor;
      ctx.lineWidth   = 4;
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
      ctx.lineWidth   = 3;
      ctx.beginPath(); ctx.moveTo(ax1, ay1); ctx.lineTo(ex, ey); ctx.lineTo(ax2, ay2); ctx.stroke();
    }
  }

  // ── Word path highlight ──────────────────────────────────────────────
  function findWordPath(word) {
    const letters = word.split('');
    const len     = letters.length;
    const visited = new Array(16).fill(false);
    const path    = [];

    function dfs() {
      const idx  = path.length;
      if (idx === len) return true;
      const last = idx > 0 ? path[idx - 1] : -1;
      for (let c = 0; c < 16; c++) {
        if (!visited[c] && grid[c] === letters[idx] && (last === -1 || isAdj(last, c))) {
          visited[c] = true;
          path.push(c);
          if (dfs()) return true;
          path.pop();
          visited[c] = false;
        }
      }
      return false;
    }

    dfs();
    return path.length === len ? [...path] : null;
  }

  function showHighlight(chipEl, path) {
    clearHighlight();
    if (!path) return;
    chipEl.classList.add('chip-active');
    const cells = gridEl.children;
    const last  = path.length - 1;

    path.forEach((cellIdx, pos) => {
      const cell = cells[cellIdx];
      cell.classList.add('highlight-found');
      if (pos === 0) cell.classList.add('first-highlight');

      // Compute travel direction through this tile (prev → next, or edge tiles)
      const prevIdx = pos > 0    ? path[pos - 1] : null;
      const nextIdx = pos < last ? path[pos + 1] : null;
      const refFrom = prevIdx !== null ? prevIdx : cellIdx;
      const refTo   = nextIdx !== null ? nextIdx : cellIdx;
      const dc = (refTo % 4)           - (refFrom % 4);
      const dr = Math.floor(refTo / 4) - Math.floor(refFrom / 4);
      // CSS gradient angle: 0deg = top, clockwise → atan2(dc, -dr)
      const deg = Math.round(Math.atan2(dc, -dr) * 180 / Math.PI);

      // Directional gradient colours per position
      if (pos === 0) {
        cell.style.background = `linear-gradient(${deg}deg, #fef9c3, #f59e0b)`;
      } else if (pos === last) {
        cell.style.background = `linear-gradient(${deg}deg, #fbbf24, #92400e)`;
      } else {
        cell.style.background = `linear-gradient(${deg}deg, #fde68a, #d97706)`;
      }
    });

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (path.length >= 2) {
      drawArrowPath(path.map(cellCenter), 'rgba(245,158,11,0.22)', 'rgba(245,158,11,0.88)');
    }
  }

  function clearHighlight() {
    document.querySelectorAll('.chip-active').forEach(el => el.classList.remove('chip-active'));
    const cells = gridEl.children;
    for (let i = 0; i < cells.length; i++) {
      cells[i].classList.remove('highlight-found', 'first-highlight');
      cells[i].style.background = '';
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (sel.length >= 2) redrawPath();
  }

  // ── Selection ───────────────────────────────────────────────────────
  function isAdj(a, b) {
    const ra = Math.floor(a / 4), ca = a % 4;
    const rb = Math.floor(b / 4), cb = b % 4;
    return Math.abs(ra - rb) <= 1 && Math.abs(ca - cb) <= 1 && a !== b;
  }

  function trySelect(idx) {
    if (idx < 0 || idx >= 16) return;
    const existAt = sel.indexOf(idx);
    if (existAt >= 0) {
      sel = sel.slice(0, existAt + 1);
      applyVisuals();
      return;
    }
    if (sel.length === 0 || isAdj(sel[sel.length - 1], idx)) {
      sel.push(idx);
      applyVisuals();
    }
  }

  function applyVisuals() {
    const cells = gridEl.children;
    for (let i = 0; i < cells.length; i++) {
      const pos = sel.indexOf(i);
      cells[i].classList.toggle('selected',       pos >= 0);
      cells[i].classList.toggle('first-selected', pos === 0);
    }
    redrawPath();
    refreshWordDisplay();
  }

  function refreshWordDisplay() {
    const word = sel.map(i => grid[i]).join('');
    if (!word) {
      wordDisp.innerHTML = '';
      wordDisp.style.color = '';
      wordDisp.style.textShadow = '';
      wordMeta.textContent = '';
      wordMeta.style.color = '';
      return;
    }
    wordDisp.innerHTML = word.split('')
      .map((l, i) => `<span class="letter-span" style="animation-delay:${i * 0.04}s">${l}</span>`)
      .join('');
    const len = word.length;
    const minLen = lang === 'hu' ? 2 : 3;
    wordMeta.textContent = len >= minLen
      ? t().wordMeta(len, calcScore(word))
      : t().wordShort(len);
  }

  function resetSel() {
    sel  = [];
    drag = false;
    applyVisuals();
  }

  // ── Auto-submit on release ───────────────────────────────────────────
  function trySubmit() {
    drag = false;
    const word = sel.map(i => grid[i]).join('');

    // Invalid (too short, unknown, already found): silent reset
    if (word.length < 2 || !getWordset().has(word) || found.has(word)) {
      resetSel();
      return;
    }

    // Valid new word — flash green
    const flashIdxs = [...sel];
    const cells = gridEl.children;

    sel = [];
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (const i of flashIdxs) {
      cells[i].classList.remove('selected', 'first-selected');
      cells[i].classList.add('flash-good');
    }

    // Turn word display green
    wordDisp.style.color      = '#4ade80';
    wordDisp.style.textShadow = '0 0 28px rgba(74,222,128,0.7)';
    wordMeta.style.color      = '#4ade80';

    setTimeout(() => {
      found.add(word);
      const pts = calcScore(word);
      score += pts;
      scoreEl.textContent = score;
      updateCountEl();
      tallyEl.textContent = t().tally(found.size);

      if (word.length > bestWord.length) {
        bestWord = word;
        bestEl.textContent = word;
      }

      addChip(word, pts);

      for (const i of flashIdxs) cells[i].classList.remove('flash-good');

      wordDisp.innerHTML        = '';
      wordDisp.style.color      = '';
      wordDisp.style.textShadow = '';
      wordMeta.textContent      = '';
      wordMeta.style.color      = '';
    }, 520);
  }

  // ── Mouse events ────────────────────────────────────────────────────
  function cellFromEl(el) {
    const c = el && el.closest ? el.closest('.cell') : null;
    return c ? parseInt(c.dataset.i) : -1;
  }

  function cellFromPoint(x, y) {
    const el = document.elementFromPoint(x, y);
    if (!el) return -1;
    if (el.classList.contains('cell')) return parseInt(el.dataset.i);
    const c = el.closest && el.closest('.cell');
    return c ? parseInt(c.dataset.i) : -1;
  }

  gridEl.addEventListener('mousedown', e => {
    const idx = cellFromEl(e.target);
    if (idx < 0) return;
    e.preventDefault();
    drag = true;
    sel  = [];
    trySelect(idx);
  });

  document.addEventListener('mousemove', e => {
    if (!drag) return;
    trySelect(cellFromPoint(e.clientX, e.clientY));
  });

  document.addEventListener('mouseup', () => {
    if (drag) trySubmit();
    else drag = false;
  });

  // ── Touch events ────────────────────────────────────────────────────
  gridEl.addEventListener('touchstart', e => {
    e.preventDefault();
    drag = true;
    sel  = [];
    const t = e.touches[0];
    trySelect(cellFromPoint(t.clientX, t.clientY));
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (!drag) return;
    e.preventDefault();
    const t = e.touches[0];
    trySelect(cellFromPoint(t.clientX, t.clientY));
  }, { passive: false });

  document.addEventListener('touchend', () => {
    if (drag) trySubmit();
    else drag = false;
  });

  // ── Buttons ─────────────────────────────────────────────────────────
  document.getElementById('reveal-btn').addEventListener('click', () => {
    if (revealed) return;
    revealed = true;
    document.getElementById('reveal-btn').disabled = true;
    const all = getAllWords();
    const sorted = [...all].sort();
    for (const word of sorted) {
      if (!found.has(word)) {
        found.add(word);
        addRevealedChip(word);
      }
    }
    updateCountEl();
    tallyEl.textContent = t().tally(found.size);
  });

  document.getElementById('lang-btn').addEventListener('click', () => {
    lang = lang === 'hu' ? 'en' : 'hu';
    score = 0; bestWord = '';
    scoreEl.textContent = '0';
    bestEl.textContent  = '—';
    tallyEl.textContent = '—';
    found.clear();
    wordsList.innerHTML = '';
    applyLang();
    initGame();
  });

  function applyLang() {
    const s = t();
    document.documentElement.lang                          = lang;
    document.getElementById('tagline').textContent         = s.tagline;
    document.getElementById('lbl-score').textContent       = s.score;
    document.getElementById('lbl-words').textContent       = s.words;
    document.getElementById('lbl-best').textContent        = s.best;
    document.getElementById('reveal-btn').textContent      = s.revealAll;
    document.getElementById('new-btn').textContent         = s.newGame;
    document.getElementById('found-words-lbl').textContent = s.foundWords;
    document.getElementById('lang-btn').textContent        = s.langLabel;
    if (found.size > 0) tallyEl.textContent = s.tally(found.size);
    refreshWordDisplay();
  }

  document.getElementById('new-btn').addEventListener('click', () => {
    if (found.size > 0) {
      if (!confirm(t().confirm)) return;
    }
    score = 0; bestWord = '';
    scoreEl.textContent = '0';
    bestEl.textContent  = '—';
    tallyEl.textContent = '—';
    found.clear();
    wordsList.innerHTML = '';
    initGame();
  });

  // ── Helpers ──────────────────────────────────────────────────────────
  function updateCountEl() {
    countEl.textContent = totalWords >= 0
      ? `${found.size} / ${totalWords}`
      : `${found.size} / ?`;
  }

  function calcScore(word) {
    const n = word.length;
    if (n < 3)   return 0;
    if (n === 3) return 1;
    if (n === 4) return 2;
    if (n === 5) return 4;
    if (n === 6) return 7;
    if (n === 7) return 11;
    return 15 + (n - 8) * 5;
  }

  function addChip(word, pts) {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `${word}<span class="pts">+${pts}</span>`;

    chip.addEventListener('mouseenter', () => showHighlight(chip, findWordPath(word)));
    chip.addEventListener('mouseleave', clearHighlight);
    chip.addEventListener('touchstart', e => {
      e.preventDefault();
      showHighlight(chip, findWordPath(word));
    }, { passive: false });
    chip.addEventListener('touchend',    clearHighlight);
    chip.addEventListener('touchcancel', clearHighlight);

    wordsList.prepend(chip);
  }

  function addRevealedChip(word) {
    const chip = document.createElement('div');
    chip.className = 'chip chip-revealed';
    chip.textContent = word;
    chip.addEventListener('mouseenter', () => showHighlight(chip, findWordPath(word)));
    chip.addEventListener('mouseleave', clearHighlight);
    chip.addEventListener('touchstart', e => {
      e.preventDefault();
      showHighlight(chip, findWordPath(word));
    }, { passive: false });
    chip.addEventListener('touchend',    clearHighlight);
    chip.addEventListener('touchcancel', clearHighlight);
    wordsList.append(chip);
  }

  // ── Total words (DFS + prefix pruning) ──────────────────────────────
  function getAllWords() {
    const all = new Set();
    const vis = new Array(16).fill(false);
    const ws  = getWordset();
    const ps  = getPrefixes();

    function dfs(last, word) {
      if (!ps.has(word)) return;
      if (word.length >= 2 && ws.has(word)) all.add(word);
      if (word.length >= 8) return;
      for (let n = 0; n < 16; n++) {
        if (!vis[n] && isAdj(last, n)) {
          vis[n] = true;
          dfs(n, word + grid[n]);
          vis[n] = false;
        }
      }
    }

    for (let s = 0; s < 16; s++) {
      vis[s] = true;
      dfs(s, grid[s]);
      vis[s] = false;
    }
    return all;
  }

  function countTotalWords() { return getAllWords().size; }

  // ── Resize ───────────────────────────────────────────────────────────
  window.addEventListener('resize', () => requestAnimationFrame(fitCanvas));

  // ── Start ────────────────────────────────────────────────────────────
  applyLang();
  initGame();
</script>
</body>
</html>
